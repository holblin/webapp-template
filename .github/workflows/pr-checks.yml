name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.11.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate GraphQL code
        run: npm run codegen

      - name: Run lint
        run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.11.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate GraphQL code
        run: npm run codegen

      - name: Run unit tests
        run: npm run test:unit

  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.11.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate GraphQL code
        run: npm run codegen

      - name: Run Storybook tests
        run: npm run test:storybook --workspace webapp-template-frontend

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.11.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers and system deps
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
